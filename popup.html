<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .header {
      padding: 16px 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      position: relative;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      opacity: 0.9;
    }

    .refresh-icon {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 16px;
    }

    .refresh-icon:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: rotate(90deg);
    }

    .refresh-icon:active {
      transform: rotate(180deg);
    }

    .content {
      padding: 16px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-height: 110px;
      display: flex;
      flex-direction: column;
    }

    .metric-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.8;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .metric-value {
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: auto;
    }

    .metric-unit {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.9;
    }

    .metric-subtext {
      font-size: 11px;
      margin-top: 6px;
      opacity: 0.8;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      margin-top: 6px;
    }

    .status-good {
      background: rgba(16, 185, 129, 0.3);
      border: 1px solid rgba(16, 185, 129, 0.5);
    }

    .status-warning {
      background: rgba(245, 158, 11, 0.3);
      border: 1px solid rgba(245, 158, 11, 0.5);
    }

    .status-bad {
      background: rgba(239, 68, 68, 0.3);
      border: 1px solid rgba(239, 68, 68, 0.5);
    }

    .diagnosis {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      border-left: 3px solid #fbbf24;
    }

    .diagnosis-title {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .diagnosis-text {
      font-size: 11px;
      line-height: 1.5;
      opacity: 0.95;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
      opacity: 0.8;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .refresh-btn {
      width: 100%;
      padding: 10px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    .timestamp {
      text-align: center;
      font-size: 10px;
      opacity: 0.7;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="refresh-icon" id="refreshIconTop">🔄</div>
    <h1>🚀 Speed Monitor</h1>
    <div class="subtitle">Real-time loading diagnostics</div>
  </div>

  <div class="content">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      Analyzing current page...
    </div>

    <div id="metrics" style="display: none;">
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Page Load Time</div>
          <div class="metric-value">
            <span id="loadTime">-</span>
            <span class="metric-unit">ms</span>
          </div>
          <div id="loadStatus"></div>
        </div>

        <div class="metric-card">
          <div class="metric-label">DNS Lookup</div>
          <div class="metric-value">
            <span id="dnsTime">-</span>
            <span class="metric-unit">ms</span>
          </div>
          <div class="metric-subtext" id="dnsSubtext"></div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Server Response (TTFB)</div>
          <div class="metric-value">
            <span id="ttfbTime">-</span>
            <span class="metric-unit">ms</span>
          </div>
          <div id="ttfbStatus"></div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Content Download</div>
          <div class="metric-value">
            <span id="downloadTime">-</span>
            <span class="metric-unit">ms</span>
          </div>
          <div class="metric-subtext" id="downloadSubtext"></div>
        </div>
      </div>

      <div class="diagnosis" id="diagnosis">
        <div class="diagnosis-title">
          <span>💡</span>
          <span>Diagnosis</span>
        </div>
        <div class="diagnosis-text" id="diagnosisText"></div>
      </div>

      <button class="refresh-btn" id="refreshBtn">🔄 Refresh Analysis</button>
      
      <div class="timestamp" id="timestamp"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
